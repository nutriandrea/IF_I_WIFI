<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CSI Radar 3D — Blob Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Monaco, monospace;
    background: #000;
    color: #00ff88;
  }
  #canvas-container { position: absolute; inset: 0; }

  /* HUD radar-style */
  .panel {
    position: absolute;
    background: rgba(0, 30, 18, 0.78);
    border: 1px solid #00ff88aa;
    box-shadow: 0 0 8px #00ff8855, inset 0 0 6px #00ff8822;
    border-radius: 4px;
    padding: 10px 14px;
    backdrop-filter: blur(4px);
    pointer-events: none;
    font-size: 0.78rem;
    color: #00ff88;
    text-shadow: 0 0 4px #00ff8855;
  }
  #panel-tl { top: 12px; left: 12px; min-width: 240px; }
  #panel-tr { top: 12px; right: 12px; min-width: 200px; }
  #panel-bl { bottom: 12px; left: 12px; }
  #panel-br { bottom: 12px; right: 12px; font-size: 0.65rem; opacity: 0.6; }

  .panel h1 {
    font-size: 0.85rem;
    color: #00ff88;
    margin-bottom: 6px;
    letter-spacing: 1.5px;
    border-bottom: 1px solid #00ff8844;
    padding-bottom: 3px;
  }
  .panel .row {
    display: flex; justify-content: space-between; gap: 12px;
    font-variant-numeric: tabular-nums;
    line-height: 1.5;
  }
  .panel .lbl { color: #00ff8888; }
  .panel .val { color: #00ff88; }
  .panel .val.big {
    font-size: 1.2rem;
    font-weight: 600;
    text-shadow: 0 0 8px #00ff88aa;
  }

  /* Motion indicator — barra grande */
  #motion-indicator {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 30, 18, 0.85);
    border: 1px solid #00ff88aa;
    border-radius: 4px;
    padding: 10px 24px;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 3px;
    pointer-events: none;
    text-align: center;
    min-width: 200px;
    transition: all 0.25s ease;
  }
  #motion-indicator.fermo {
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88aa;
    border-color: #00ff88aa;
  }
  #motion-indicator.movimento {
    color: #ff3333;
    text-shadow: 0 0 12px #ff3333dd;
    border-color: #ff3333;
    background: rgba(40, 0, 0, 0.85);
    animation: pulse-red 0.6s infinite alternate;
  }
  @keyframes pulse-red {
    from { box-shadow: 0 0 10px #ff333344, inset 0 0 6px #ff333322; }
    to   { box-shadow: 0 0 22px #ff3333aa, inset 0 0 12px #ff333344; }
  }

  /* Status dot */
  #status-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px;
  }
  #status-dot.live { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  #status-dot.dead { background: #ff3333; box-shadow: 0 0 6px #ff3333; }
  #status-dot.idle { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }

  /* Marker labels in 3D */
  .marker-label {
    color: #00ff88;
    font-size: 0.65rem;
    font-weight: 600;
    background: rgba(0, 20, 10, 0.8);
    border: 1px solid #00ff8866;
    padding: 1px 5px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 4px #00ff8866;
  }
  .marker-label.tx {
    color: #88ddff;
    border-color: #88ddff66;
    text-shadow: 0 0 4px #88ddff66;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="motion-indicator" class="fermo">FERMO</div>

<div class="panel" id="panel-tl">
  <h1>CSI RADAR · BLOB TRACKING</h1>
  <div class="row"><span class="lbl">ROOM</span>
    <span class="val" id="room-dims">—</span></div>
  <div class="row"><span class="lbl">RX NODES</span>
    <span class="val" id="rx-count">0</span></div>
  <div class="row"><span class="lbl">TX SOURCES</span>
    <span class="val" id="tx-count">0</span></div>
  <div class="row"><span class="lbl">WS</span>
    <span class="val"><span id="status-dot" class="dead"></span><span id="ws-status">DISCONNECTED</span></span></div>
</div>

<div class="panel" id="panel-tr">
  <h1>TARGET</h1>
  <div class="row"><span class="lbl">X</span>
    <span class="val big" id="t-x">—</span></div>
  <div class="row"><span class="lbl">Y</span>
    <span class="val big" id="t-y">—</span></div>
  <div class="row"><span class="lbl">SPEED</span>
    <span class="val" id="t-speed">—</span></div>
  <div class="row"><span class="lbl">CONF</span>
    <span class="val" id="t-conf">—</span></div>
</div>

<div class="panel" id="panel-bl">
  <h1>SIGNAL</h1>
  <div class="row"><span class="lbl">FRAMES</span>
    <span class="val" id="frame-count">0</span></div>
  <div class="row"><span class="lbl">FPS</span>
    <span class="val" id="fps">0</span></div>
  <div class="row"><span class="lbl">UPDATE</span>
    <span class="val" id="last-update">—</span></div>
</div>

<div class="panel" id="panel-br">
  DRAG = rotate · SCROLL = zoom · R-DRAG = pan<br>
  URL: <code>ws,room,rx,tx</code>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================
// Config via URL params
// ============================================================
const params = new URLSearchParams(location.search);
function parseDims(s, defaults) {
  if (!s) return defaults;
  const parts = s.toLowerCase().split('x').map(Number);
  return parts.some(isNaN) ? defaults : parts;
}
function parsePoints(s, defaults) {
  if (!s) return defaults;
  return s.split(';').map(p => {
    const [x, y] = p.split(',').map(Number);
    return { x: x || 0, y: y || 0 };
  });
}

const CFG = {
  wsUrl: params.get('ws') || `ws://${location.hostname || 'localhost'}:8765`,
  roomDims: parseDims(params.get('room'), [2.5, 6, 2.7]),
  rxPositions: parsePoints(params.get('rx'),
    [{x:0.2,y:0.5},{x:2.3,y:3.0},{x:0.2,y:5.5}]),
  txPositions: parsePoints(params.get('tx'),
    [{x:2.3,y:0.5},{x:0.2,y:3.0},{x:2.3,y:5.5}]),
  trailLen: 80,
};

const [ROOM_W, ROOM_L, ROOM_H] = CFG.roomDims;

// ============================================================
// Three.js setup
// ============================================================
const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.05);

const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(ROOM_W * 1.3, ROOM_H * 2.0, ROOM_L * 1.2);
camera.lookAt(ROOM_W / 2, 0.5, ROOM_L / 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.inset = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(ROOM_W / 2, 0, ROOM_L / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;

// Lights — minimi (look "scuro radar")
scene.add(new THREE.AmbientLight(0x224433, 0.4));
const greenLight = new THREE.PointLight(0x00ff88, 0.6, 30);
greenLight.position.set(ROOM_W / 2, ROOM_H, ROOM_L / 2);
scene.add(greenLight);

// ============================================================
// Stanza: pavimento scuro + griglia verde fluorescente
// ============================================================
const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_L);
const floorMat = new THREE.MeshBasicMaterial({
  color: 0x002211, transparent: true, opacity: 0.5,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(ROOM_W / 2, 0, ROOM_L / 2);
scene.add(floor);

// Griglia 0.5m con effetto fosforescente
const gridStep = 0.5;
const gridMat = new THREE.LineBasicMaterial({
  color: 0x00ff88, transparent: true, opacity: 0.3,
});
const gridPts = [];
for (let i = 0; i <= ROOM_W; i += gridStep) {
  gridPts.push(new THREE.Vector3(i, 0.01, 0));
  gridPts.push(new THREE.Vector3(i, 0.01, ROOM_L));
}
for (let i = 0; i <= ROOM_L; i += gridStep) {
  gridPts.push(new THREE.Vector3(0, 0.01, i));
  gridPts.push(new THREE.Vector3(ROOM_W, 0.01, i));
}
const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPts);
const grid = new THREE.LineSegments(gridGeo, gridMat);
scene.add(grid);

// Wireframe pareti (cubo verde)
const wireGeo = new THREE.BoxGeometry(ROOM_W, ROOM_H, ROOM_L);
const wireMat = new THREE.LineBasicMaterial({
  color: 0x00ff88, transparent: true, opacity: 0.4,
});
const wireBox = new THREE.LineSegments(
  new THREE.EdgesGeometry(wireGeo), wireMat
);
wireBox.position.set(ROOM_W / 2, ROOM_H / 2, ROOM_L / 2);
scene.add(wireBox);

// ============================================================
// Sweep sonar (cerchio che si espande dal centro)
// ============================================================
const sweepRings = [];
const SWEEP_MAX_RADIUS = Math.max(ROOM_W, ROOM_L);
function createSweepRing() {
  const ringGeo = new THREE.RingGeometry(0.1, 0.12, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00ff88, side: THREE.DoubleSide,
    transparent: true, opacity: 0.6, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.userData.radius = 0.1;
  ring.userData.born = performance.now();
  return ring;
}

// ============================================================
// Marker RX e TX
// ============================================================
function makeMarker(p, color, label, cls, height) {
  const geo = cls === 'rx'
    ? new THREE.BoxGeometry(0.18, 0.14, 0.14)
    : new THREE.OctahedronGeometry(0.13);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.95,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(p.x, height, p.y);
  scene.add(m);

  // Glow pulsante
  const gMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.25, depthWrite: false,
  });
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 16, 16), gMat);
  m.add(glow);
  m.userData.glow = glow;

  // Label
  const labelDiv = document.createElement('div');
  labelDiv.className = `marker-label ${cls}`;
  labelDiv.textContent = label;
  const labelObj = new CSS2DObject(labelDiv);
  labelObj.position.set(0, 0.22, 0);
  m.add(labelObj);
  return m;
}

const rxMarkers = CFG.rxPositions.map((p, i) =>
  makeMarker(p, 0x00ff88, `RX${i}`, 'rx', 1.5));
const txMarkers = CFG.txPositions.map((p, i) =>
  makeMarker(p, 0x88ddff, `TX${i}`, 'tx', 1.0));

document.getElementById('rx-count').textContent = rxMarkers.length;
document.getElementById('tx-count').textContent = txMarkers.length;
document.getElementById('room-dims').textContent =
  `${ROOM_W}x${ROOM_L}x${ROOM_H}m`;

// ============================================================
// BLOB — la "persona" come sfera + alone
// ============================================================
const blobGroup = new THREE.Group();
scene.add(blobGroup);

// Core: sfera che pulsa
const coreMat = new THREE.MeshBasicMaterial({
  color: 0xff3333, transparent: true, opacity: 0.95,
});
const coreMesh = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 24), coreMat);
blobGroup.add(coreMesh);

// Alone esterno (semitrasparente, grande quando confidence bassa)
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xff5544, transparent: true, opacity: 0.18,
  depthWrite: false, side: THREE.DoubleSide,
});
const haloMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 16), haloMat);
blobGroup.add(haloMesh);

// Cilindro/colonna verso il pavimento (effetto "spot")
const colMat = new THREE.MeshBasicMaterial({
  color: 0xff3333, transparent: true, opacity: 0.18,
});
const colMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.32, 0, 24, 1, true),
  colMat
);
blobGroup.add(colMesh);

blobGroup.visible = false;

// Trail di posizioni passate (linea verde svanente)
const trailPositions = [];
const trailGeo = new THREE.BufferGeometry();
const trailMat = new THREE.LineBasicMaterial({
  color: 0x00ff88, transparent: true, opacity: 0.5,
});
const trailLine = new THREE.Line(trailGeo, trailMat);
scene.add(trailLine);

// Linea velocita' (freccia dal blob nella direzione di movimento)
const velLineGeo = new THREE.BufferGeometry();
const velLineMat = new THREE.LineBasicMaterial({
  color: 0xffaa00, transparent: true, opacity: 0.8, linewidth: 2,
});
const velLine = new THREE.Line(velLineGeo, velLineMat);
scene.add(velLine);

// ============================================================
// Update from WebSocket message
// ============================================================
let lastState = null;
function updateBlob(state) {
  const { x, y, vx, vy, speed, motion, confidence } = state;

  blobGroup.visible = true;
  blobGroup.position.set(x, 1.0, y);

  // Halo size proportional to inverse confidence (high incertezza = halo grande)
  const haloR = 0.4 + (1 - (confidence || 0.5)) * 1.0;
  haloMesh.scale.set(haloR, haloR, haloR);

  // Color: red se movimento, verde se fermo
  const c = motion ? 0xff3333 : 0x00ff88;
  coreMat.color.setHex(c);
  haloMat.color.setHex(motion ? 0xff5544 : 0x88ffcc);
  colMat.color.setHex(c);

  // Column geometry tra blob e pavimento
  blobGroup.children[2].geometry.dispose();
  blobGroup.children[2].geometry = new THREE.CylinderGeometry(
    0.06, 0.32, 1.0, 24, 1, true);
  blobGroup.children[2].position.y = -0.5;

  // Trail
  trailPositions.push(new THREE.Vector3(x, 0.05, y));
  if (trailPositions.length > CFG.trailLen) trailPositions.shift();
  trailGeo.setFromPoints(trailPositions);

  // Velocity arrow
  const vScale = 2.0;
  velLineGeo.setFromPoints([
    new THREE.Vector3(x, 1.0, y),
    new THREE.Vector3(x + vx * vScale, 1.0, y + vy * vScale),
  ]);
  velLine.visible = speed > 0.05;

  // Spawn sweep ring on update
  if (Math.random() < 0.15) {
    const r = createSweepRing();
    r.position.set(x, 0.06, y);
    scene.add(r);
    sweepRings.push(r);
  }

  // HUD updates
  document.getElementById('t-x').textContent = x.toFixed(2);
  document.getElementById('t-y').textContent = y.toFixed(2);
  document.getElementById('t-speed').textContent = `${speed.toFixed(2)} m/s`;
  document.getElementById('t-conf').textContent =
    confidence ? `${(confidence * 100).toFixed(0)}%` : '—';

  const ind = document.getElementById('motion-indicator');
  ind.className = motion ? 'movimento' : 'fermo';
  ind.textContent = motion ? 'MOVIMENTO' : 'FERMO';

  lastState = state;
}

// ============================================================
// WebSocket
// ============================================================
let ws = null;
let frameCount = 0;
let reconnectTimer = null;

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = state;
  document.getElementById('ws-status').textContent = text;
}

function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN ||
             ws.readyState === WebSocket.CONNECTING)) return;
  setStatus('idle', 'CONNECTING...');
  try { ws = new WebSocket(CFG.wsUrl); }
  catch { setStatus('dead', 'ERROR'); scheduleReconnect(); return; }

  ws.onopen = () => setStatus('live', 'CONNECTED');
  ws.onclose = () => { setStatus('dead', 'DISCONNECTED'); scheduleReconnect(); };
  ws.onerror = () => ws.close();
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'blob') {
      updateBlob(msg);
      frameCount++;
      document.getElementById('frame-count').textContent = frameCount;
      document.getElementById('last-update').textContent =
        new Date().toLocaleTimeString();
    } else if (msg.type === 'position') {
      // Compatibilita' col vecchio classifier-based output: ignora
    }
  };
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connectWS, 2000);
}

connectWS();

// ============================================================
// FPS counter
// ============================================================
let frameTimes = [];
function tickFps() {
  const now = performance.now();
  frameTimes.push(now);
  while (frameTimes.length > 0 && now - frameTimes[0] > 1000) {
    frameTimes.shift();
  }
  document.getElementById('fps').textContent = frameTimes.length;
}

// ============================================================
// Animation loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Pulse del blob core
  if (blobGroup.visible) {
    const t = performance.now() / 1000;
    const pulse = 1 + 0.18 * Math.sin(t * 4);
    coreMesh.scale.setScalar(pulse);
  }

  // Glow pulse dei marker
  const t = performance.now() / 1000;
  for (const m of rxMarkers) {
    const k = 1 + 0.1 * Math.sin(t * 2);
    m.userData.glow.scale.setScalar(k);
  }
  for (const m of txMarkers) {
    const k = 1 + 0.08 * Math.sin(t * 2.5);
    m.userData.glow.scale.setScalar(k);
  }

  // Sweep rings: espandono e svaniscono
  const NOW = performance.now();
  for (let i = sweepRings.length - 1; i >= 0; i--) {
    const r = sweepRings[i];
    const age = (NOW - r.userData.born) / 1000;
    if (age > 2.5) {
      scene.remove(r);
      r.geometry.dispose();
      r.material.dispose();
      sweepRings.splice(i, 1);
      continue;
    }
    const radius = 0.1 + age * 1.5;
    r.scale.set(radius, radius, 1);
    r.material.opacity = Math.max(0, 0.6 * (1 - age / 2.5));
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
  tickFps();
}
animate();

// ============================================================
// Resize handler
// ============================================================
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
});

// ============================================================
// Demo mode (sintetico se WS non si connette entro 5s)
// ============================================================
let demoStart = null;
setTimeout(() => {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  console.log('[demo] WS offline, attivo simulazione');
  setStatus('idle', 'DEMO MODE');
  demoStart = performance.now();
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    const t = (performance.now() - demoStart) / 1000;
    // Cammina in cerchio + occasional standstill
    const phase = (t % 12) / 12;
    const r = 0.8;
    const cx = ROOM_W / 2, cy = ROOM_L / 2;
    const ang = phase * Math.PI * 2;
    const x = cx + r * Math.cos(ang);
    const y = cy + (ROOM_L * 0.4) * Math.sin(ang);
    const motion = phase < 0.85;   // simula "fermo" per ultimo 15%
    const speed = motion ? 0.35 + 0.1 * Math.sin(t * 3) : 0.02;
    const vx = motion ? -r * Math.sin(ang) * 0.5 : 0;
    const vy = motion ? (ROOM_L * 0.4) * Math.cos(ang) * 0.5 : 0;
    updateBlob({
      x, y, vx, vy, speed,
      motion,
      confidence: 0.7 + 0.2 * Math.sin(t * 2),
    });
    frameCount++;
    document.getElementById('frame-count').textContent = frameCount;
  }, 100);
}, 5000);

</script>
</body>
</html>
