<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Map 3D — WiFi Sensing Heatmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b0b1a; color: #e2e8f0; overflow: hidden;

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }

<script type="module">
// ============================================================
// Room Map 3D — Three.js visualization with live heatmap
// ============================================================
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ---- Config ----
const CFG = {
  wsUrl: `ws://${location.hostname}:8765`,
  pollUrl: 'position.json',
  pollInterval: 500,
  heatmapRes: 40,          // grid cells per dimension
  heatmapSigmaMin: 0.3,    // sigma when confidence=1 (meters)
  heatmapSigmaMax: 2.0,    // sigma when confidence=0 (meters)
  trailLength: 100,
  apColor: 0x6366f1,       // indigo
  rxColor: 0x22c55e,       // green
  personColor: 0x38bdf8,   // sky blue
  wallOpacity: 0.12,
  floorColor: 0x0a0a1a,
};

// ---- State ----
const state = {
  room: { width: 8, height: 6, height_m: 3.0, name: '—' },
  apPositions: [],
  x: 0.5, y: 0.5,          // normalized 0..1
  confidence: 0,
  nearestLabel: '',
  rssi: [],
  trail: [],
  heatmapData: null,        // Float32Array
  fps: 0, _fc: 0, _fts: 0,
  connected: false,
};

// ---- Three.js setup ----
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0b1a);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 50);
camera.position.set(7, 7, 9);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Label renderer
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 2;
controls.maxDistance = 25;
controls.target.set(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0x222244, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x4444ff, 0.3);
fillLight.position.set(-3, 5, -5);
scene.add(fillLight);

// ---- Coordinate mapping ----
// Fingerprint: x=0..W, y=0..H (depth)
// Three.js: x same, z = fingerprint_y - H/2, y up
function fpx(x, y) {
  return { x: x - state.room.width / 2, z: y - state.room.height / 2 };
}

// ---- Build environment ----
let roomGroup = new THREE.Group();
let apGroup = new THREE.Group();
let personGroup = new THREE.Group();
let floorHeatmap = null;
let heatmapTexture = null;
let heatmapCanvas = null;
let trailLine = null;
let trailPositions = [];
let signalLines = [];

function buildRoom() {
  // Remove old
  if (roomGroup.parent) scene.remove(roomGroup);
  if (apGroup.parent) scene.remove(apGroup);
  if (personGroup.parent) scene.remove(personGroup);
  roomGroup = new THREE.Group();
  apGroup = new THREE.Group();
  personGroup = new THREE.Group();
  trailPositions = [];
  signalLines = [];

  const W = state.room.width;
  const H = state.room.height;
  const RH = state.room.height_m || 3.0;
  const hw = W / 2, hh = H / 2, hr = RH / 2;

  // ---- Floor ----
  const floorGeo = new THREE.PlaneGeometry(W, H);
  const floorMat = new THREE.MeshStandardMaterial({
    color: CFG.floorColor, roughness: 0.8, metalness: 0.1,
    side: THREE.DoubleSide,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.01;
  floor.receiveShadow = true;
  roomGroup.add(floor);

  // ---- Grid ----
  const gridMat = new THREE.LineBasicMaterial({ color: 0x1a1a3a, transparent: true, opacity: 0.5 });
  const step = 0.5;
  for (let gx = -hw; gx <= hw; gx += step) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute([gx, 0.005, -hh, gx, 0.005, hh], 3));
    roomGroup.add(new THREE.Line(g, gridMat));
  }
  for (let gz = -hh; gz <= hh; gz += step) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute([-hw, 0.005, gz, hw, 0.005, gz], 3));
    roomGroup.add(new THREE.Line(g, gridMat));
  }

  // ---- Walls ----
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a3a, transparent: true, opacity: CFG.wallOpacity,
    side: THREE.DoubleSide, roughness: 0.5, metalness: 0.1,
  });
  const wallEdgeMat = new THREE.LineBasicMaterial({ color: 0x2a2a5a, transparent: true, opacity: 0.3 });

  function addWall(cx, cy, cz, w, h, ry) {
    const geo = new THREE.PlaneGeometry(w, h);
    const mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.set(cx, cy, cz);
    mesh.rotation.y = ry;
    roomGroup.add(mesh);
    // edge
    const eg = new THREE.EdgesGeometry(geo);
    const edge = new THREE.LineSegments(eg, wallEdgeMat);
    edge.position.copy(mesh.position);
    edge.rotation.y = ry;
    roomGroup.add(edge);
  }

  addWall(0, hr, -hh, W, RH, 0);       // back
  addWall(0, hr, hh, W, RH, 0);        // front
  addWall(-hw, hr, 0, H, RH, Math.PI / 2); // left
  addWall(hw, hr, 0, H, RH, Math.PI / 2);  // right

  // ---- AP markers ----
  const aps = state.apPositions.length > 0 ? state.apPositions :
    [{x:W*0.25, y:2.5, z:H*0.8}, {x:W*0.5, y:2.5, z:H*0.8}, {x:W*0.75, y:2.5, z:H*0.8}];

  aps.forEach((ap, i) => {
    const p = fpx(ap.x, ap.z);
    const geo = new THREE.SphereGeometry(0.15, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
      color: CFG.apColor, emissive: CFG.apColor, emissiveIntensity: 0.3,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(p.x, ap.y, p.z);
    apGroup.add(mesh);

    // Glow ring below
    const ring = new THREE.RingGeometry(0.2, 0.3, 24);
    const ringMat = new THREE.MeshBasicMaterial({
      color: CFG.apColor, transparent: true, opacity: 0.2, side: THREE.DoubleSide,
    });
    const ringMesh = new THREE.Mesh(ring, ringMat);
    ringMesh.rotation.x = -Math.PI / 2;
    ringMesh.position.set(p.x, 0.01, p.z);
    apGroup.add(ringMesh);

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.textContent = `AP${i}`;
    labelDiv.style.color = '#818cf8';
    labelDiv.style.fontSize = '11px';
    labelDiv.style.fontWeight = '600';
    labelDiv.style.textShadow = '0 0 8px rgba(99,102,241,0.5)';
    labelDiv.style.background = 'rgba(11,11,26,0.7)';
    labelDiv.style.padding = '2px 6px';
    labelDiv.style.borderRadius = '4px';
    labelDiv.style.border = '1px solid rgba(99,102,241,0.3)';
    const label = new CSS2DObject(labelDiv);
    label.position.set(p.x, ap.y + 0.5, p.z);
    apGroup.add(label);
  });

  // ---- RX (ESP32) marker ----
  const rxPos = fpx(W * 0.15, H * 0.15);
  const rxGeo = new THREE.BoxGeometry(0.12, 0.08, 0.18);
  const rxMat = new THREE.MeshStandardMaterial({
    color: CFG.rxColor, emissive: CFG.rxColor, emissiveIntensity: 0.2,
  });
  const rxMesh = new THREE.Mesh(rxGeo, rxMat);
  rxMesh.position.set(rxPos.x, 0.05, rxPos.z);
  apGroup.add(rxMesh);

  const rxLabelDiv = document.createElement('div');
  rxLabelDiv.textContent = 'ESP32';
  rxLabelDiv.style.color = '#4ade80';
  rxLabelDiv.style.fontSize = '10px';
  rxLabelDiv.style.textShadow = '0 0 8px rgba(34,197,94,0.5)';
  rxLabelDiv.style.background = 'rgba(11,11,26,0.7)';
  rxLabelDiv.style.padding = '2px 6px';
  rxLabelDiv.style.borderRadius = '4px';
  rxLabelDiv.style.border = '1px solid rgba(34,197,94,0.3)';
  const rxLabel = new CSS2DObject(rxLabelDiv);
  rxLabel.position.set(rxPos.x, 0.4, rxPos.z);
  apGroup.add(rxLabel);

  // ---- Heatmap floor overlay ----
  const res = CFG.heatmapRes;
  heatmapCanvas = document.createElement('canvas');
  heatmapCanvas.width = res;
  heatmapCanvas.height = res;
  heatmapTexture = new THREE.CanvasTexture(heatmapCanvas);
  heatmapTexture.wrapS = heatmapTexture.wrapT = THREE.ClampToEdgeWrapping;

  const hmGeo = new THREE.PlaneGeometry(W, H);
  const hmMat = new THREE.MeshBasicMaterial({
    map: heatmapTexture,
    transparent: true,
    opacity: 0.6,
    depthWrite: false,
    side: THREE.DoubleSide,
  });
  floorHeatmap = new THREE.Mesh(hmGeo, hmMat);
  floorHeatmap.rotation.x = -Math.PI / 2;
  floorHeatmap.position.y = 0.01;
  roomGroup.add(floorHeatmap);

  // ---- Person dot ----
  const personGeo = new THREE.SphereGeometry(0.12, 16, 16);
  const personMat = new THREE.MeshStandardMaterial({
    color: CFG.personColor, emissive: CFG.personColor, emissiveIntensity: 0.5,
  });
  const personMesh = new THREE.Mesh(personGeo, personMat);
  personMesh.position.set(0, 1.0, 0);
  personGroup.add(personMesh);

  // Glow under person
  const glowRing = new THREE.RingGeometry(0.1, 0.5, 24);
  const glowMat = new THREE.MeshBasicMaterial({
    color: CFG.personColor, transparent: true, opacity: 0.0,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const glowMesh = new THREE.Mesh(glowRing, glowMat);
  glowMesh.rotation.x = -Math.PI / 2;
  glowMesh.position.y = 0.01;
  glowMesh.userData.glowMat = glowMat;
  personGroup.add(glowMesh);

  // Add all to scene
  scene.add(roomGroup);
  scene.add(apGroup);
  scene.add(personGroup);

  // Fit camera
  const maxDim = Math.max(W, H, RH);
  const dist = maxDim * 1.8;
  camera.position.set(dist * 0.6, dist * 0.6, dist * 0.8);
  controls.target.set(0, RH * 0.3, 0);
  controls.update();
}

// ---- Heatmap rendering ----
function renderHeatmap() {
  if (!heatmapCanvas || !heatmapTexture) return;

  const W = state.room.width;
  const H = state.room.height;
  const res = CFG.heatmapRes;
  const ctx = heatmapCanvas.getContext('2d');
  const imgData = ctx.createImageData(res, res);
  const pixel = new Float32Array(res * res);

  // Compute heat for each pixel
  // Use a 2D Gaussian centered at estimated position
  const cx = state.x * W;
  const cy = state.y * H;
  const sigma = CFG.heatmapSigmaMin + (1 - state.confidence) * (CFG.heatmapSigmaMax - CFG.heatmapSigmaMin);
  const sigma2 = sigma * sigma;

  let maxVal = 0;
  for (let j = 0; j < res; j++) {
    for (let i = 0; i < res; i++) {
      const px = (i / res) * W;
      const py = (j / res) * H;
      const dx = px - cx;
      const dy = py - cy;
      const v = Math.exp(-(dx * dx + dy * dy) / (2 * sigma2));
      pixel[j * res + i] = v;
      if (v > maxVal) maxVal = v;
    }
  }

  // Color map: blue -> cyan -> green -> yellow -> red
  const colors = [
    [0.00, 0.10, 0.30],  // dark blue
    [0.10, 0.40, 0.80],  // blue
    [0.10, 0.70, 0.70],  // cyan
    [0.20, 0.80, 0.30],  // green
    [0.80, 0.70, 0.10],  // yellow
    [0.90, 0.30, 0.10],  // orange
    [0.60, 0.05, 0.05],  // dark red
  ];

  function getColor(t) {
    const clamped = Math.max(0, Math.min(1, t));
    const seg = clamped * (colors.length - 1);
    const idx = Math.floor(seg);
    const frac = seg - idx;
    const i0 = Math.min(idx, colors.length - 2);
    const i1 = i0 + 1;
    return [
      colors[i0][0] + (colors[i1][0] - colors[i0][0]) * frac,
      colors[i0][1] + (colors[i1][1] - colors[i0][1]) * frac,
      colors[i0][2] + (colors[i1][2] - colors[i0][2]) * frac,
    ];
  }

  const scale = maxVal > 0 ? 1 / maxVal : 1;
  for (let j = 0; j < res; j++) {
    for (let i = 0; i < res; i++) {
      const v = pixel[j * res + i] * scale;
      const idx = (j * res + i) * 4;
      const [r, g, b] = getColor(v);
      imgData.data[idx] = Math.round(r * 255);
      imgData.data[idx + 1] = Math.round(g * 255);
      imgData.data[idx + 2] = Math.round(b * 255);
      imgData.data[idx + 3] = Math.round(v * 200); // alpha
    }
  }

  ctx.putImageData(imgData, 0, 0);
  heatmapTexture.needsUpdate = true;

  // Update glow opacity based on confidence
  const glowMesh = personGroup.children.find(c => c.userData && c.userData.glowMat);
  if (glowMesh && glowMesh.userData.glowMat) {
    glowMesh.userData.glowMat.opacity = state.confidence * 0.4;
  }
}

// ---- Person trail ----
function updateTrail() {
  // Remove old
  if (trailLine) {
    personGroup.remove(trailLine);
    trailLine.geometry.dispose();
    trailLine.material.dispose();
    trailLine = null;
  }

  if (trailPositions.length < 2) return;

  const positions = new Float32Array(trailPositions.length * 3);
  for (let i = 0; i < trailPositions.length; i++) {
    positions[i * 3] = trailPositions[i].x;
    positions[i * 3 + 1] = 0.02;
    positions[i * 3 + 2] = trailPositions[i].z;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({
    color: CFG.personColor, transparent: true, opacity: 0.25,
  });
  trailLine = new THREE.Line(geo, mat);
  personGroup.add(trailLine);
}

// ---- Signal path lines ----
function updateSignalLines() {
  // Remove old
  for (const line of signalLines) {
    personGroup.remove(line);
    line.geometry.dispose();
    line.material.dispose();
  }
  signalLines = [];

  const W = state.room.width;
  const H = state.room.height;
  const aps = state.apPositions.length > 0 ? state.apPositions :
    [{x:W*0.25, y:2.5, z:H*0.8}, {x:W*0.5, y:2.5, z:H*0.8}, {x:W*0.75, y:2.5, z:H*0.8}];

  const pp = fpx(state.x * W, state.y * H);
  const personPos = new THREE.Vector3(pp.x, 1.0, pp.z);

  aps.forEach((ap, i) => {
    const apP = fpx(ap.x, ap.z);
    const start = new THREE.Vector3(apP.x, ap.y, apP.z);

    const mid = new THREE.Vector3().lerpVectors(start, personPos, 0.5);
    mid.y += 0.5;

    const curve = new THREE.QuadraticBezierCurve3(start, mid, personPos);
    const curvePoints = curve.getPoints(20);

    const geo = new THREE.BufferGeometry().setFromPoints(curvePoints);
    const mat = new THREE.LineBasicMaterial({
      color: CFG.apColor,
      transparent: true,
      opacity: 0.15 + 0.1 * (i / aps.length),
    });
    const line = new THREE.Line(geo, mat);
    personGroup.add(line);
    signalLines.push(line);
  });
}

// ---- Update position ----
function updatePosition(data) {
  if (data.x == null || data.y == null) return;

  const W = state.room.width;
  const H = state.room.height;
  state.x = Math.max(0, Math.min(W, data.x)) / W;
  state.y = Math.max(0, Math.min(H, data.y)) / H;
  state.confidence = data.confidence ?? 0;
  state.nearestLabel = data.nearest_label || '';
  state.rssi = data.rssi || [];

  // Person dot position
  const pp = fpx(state.x * W, state.y * H);
  const personMesh = personGroup.children[0];
  if (personMesh && personMesh.isMesh) {
    personMesh.position.set(pp.x, 1.0 + state.confidence * 0.2, pp.z);
    personMesh.material.emissiveIntensity = 0.3 + state.confidence * 0.7;
  }

  // Trail
  trailPositions.push({ x: pp.x, z: pp.z });
  if (trailPositions.length > CFG.trailLength) trailPositions.shift();

  // HUD
  document.getElementById('posLabel').textContent =
    `(${data.x.toFixed(1)}, ${data.y.toFixed(1)})`;
  const confEl = document.getElementById('confLabel');
  confEl.textContent = `${(state.confidence * 100).toFixed(0)}%`;
  confEl.className = 'val ' + (
    state.confidence > 0.7 ? 'good' : state.confidence > 0.3 ? 'ok' : 'bad'
  );
  document.getElementById('labelLabel').textContent = state.nearestLabel || '—';

  renderHeatmap();
  updateTrail();
  updateSignalLines();
}

// ---- WebSocket ----
let ws = null;

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  try { ws = new WebSocket(CFG.wsUrl); } catch (e) { pollPosition(); return; }

  ws.onopen = () => {
    state.connected = true;
    document.getElementById('statusText').textContent = 'Live (WebSocket)';
    document.getElementById('status-dot').className = 'live';
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'position') updatePosition(msg);
    } catch (e) {}
  };

  ws.onclose = () => {
    state.connected = false;
    document.getElementById('statusText').textContent = 'Polling position.json';
    document.getElementById('status-dot').className = 'poll';
    ws = null;
    pollPosition();
  };
}

// ---- Polling fallback ----
let pollTimer = null;

function pollPosition() {
  if (pollTimer) return;
  async function fetchPos() {
    try {
      const r = await fetch(CFG.pollUrl + '?_=' + Date.now());
      const data = await r.json();
      if (data.x != null) updatePosition(data);
    } catch (e) {}
  }
  fetchPos();
  pollTimer = setInterval(fetchPos, CFG.pollInterval);
}

// ---- Load fingerprint ----
async function loadFingerprint() {
  try {
    const r = await fetch('fingerprint.json');
    const data = await r.json();

    state.room = {
      width: data.room.width,
      height: data.room.height,
      height_m: data.room_height_m || 3.0,
      name: data.room.name || '—',
    };
    state.apPositions = data.ap_positions || [];

    document.getElementById('roomName').textContent =
      `${state.room.name} (${state.room.width}x${state.room.height}m)`;

    buildRoom();

    // Start connection
    connectWS();

    // Initial heatmap
    renderHeatmap();
  } catch (e) {
    console.warn('fingerprint.json non caricato, uso default', e);
    buildRoom();
    connectWS();
  }
}

// ---- Resize ----
function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ---- Animation loop ----
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  // Animate person glow
  const glow = personGroup.children.find(c => c.userData && c.userData.glowMat);
  if (glow && glow.userData.glowMat && state.confidence > 0) {
    const pulse = 0.3 + 0.7 * (1 + Math.sin(performance.now() / 800)) / 2;
    glow.scale.setScalar(1 + pulse * 0.3 * state.confidence);
  }

  // Animate APs
  apGroup.children.forEach((child, i) => {
    if (child.isMesh && child.geometry.type === 'SphereGeometry') {
      const pulse = 0.8 + 0.2 * Math.sin(performance.now() / 1200 + i * 2);
      child.scale.setScalar(pulse);
    }
  });

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);

  // FPS
  state._fc++;
  const now = performance.now();
  if (now - state._fts > 1000) {
    state.fps = state._fc;
    state._fc = 0;
    state._fts = now;
    document.getElementById('fpsLabel').textContent = `${state.fps} fps`;
  }
}

// ---- Go ----
loadFingerprint();
animate();
</script>
</body>
