<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Map — WiFi Sensing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 12px; color: #38bdf8; }
  #info {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 16px; font-size: 0.9rem;
  }
  #info .badge {
    background: #1e293b; padding: 6px 14px; border-radius: 8px;
    border: 1px solid #334155;
  }
  #info .badge span { color: #94a3b8; }
  #info .badge strong { color: #38bdf8; }
  #canvas-wrapper {
    position: relative;
    border: 2px solid #334155; border-radius: 12px;
    background: #1e293b; overflow: hidden;
  }
  canvas { display: block; }
  #status {
    margin-top: 12px; font-size: 0.8rem; color: #64748b;
    display: flex; gap: 16px; align-items: center;
  }
  .dot-live { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot-red { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .rssi-row { display: flex; gap: 6px; }
  .rssi-bar {
    height: 8px; border-radius: 4px; background: #334155; flex: 1;
    position: relative; overflow: hidden;
  }
  .rssi-bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.3s;
    background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
  }
  #controls {
    margin-top: 16px; display: flex; gap: 12px;
  }
  #controls button {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-size: 0.85rem; transition: background 0.2s;
  }
  #controls button:hover { background: #334155; }
  #controls button.active { background: #0369a1; border-color: #38bdf8; }
</style>
</head>
<body>
  <h1>📍 Room Map</h1>
  <div id="info">
    <div class="badge"><span>Stanza</span> <strong id="roomName">—</strong></div>
    <div class="badge"><span>Posizione</span> <strong id="posLabel">—</strong></div>
    <div class="badge"><span>Confidenza</span> <strong id="confLabel">—</strong></div>
    <div class="badge"><span>RSSI</span> <span id="rssiLabel">—</span></div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="mapCanvas"></canvas>
  </div>
  <div id="status">
    <span class="dot-live dot-green" id="statusDot"></span>
    <span id="statusText">Connesso (WebSocket)</span>
    <span id="fpsLabel">0 fps</span>
  </div>
  <div id="controls">
    <button id="btnTrail">👣 Traccia</button>
    <button id="btnLabels">🏷️ Etichette</button>
    <button id="btnReset">↺ Reset</button>
  </div>

<script>
// ============================================================
// Config
// ============================================================
const CFG = {
  wsUrl: `ws://${location.hostname}:8765`,
  pollUrl: 'position.json',
  pollInterval: 500,
  dotRadius: 8,
  calibRadius: 10,
  trailLength: 200,
  bgColor: '#1e293b',
  gridColor: '#2a3a5c',
  calibColor: '#6366f1',
  calibLabelColor: '#a5b4fc',
  dotColor: '#38bdf8',
  trailColor: 'rgba(56, 189, 248, 0.3)',
};

// ============================================================
// State
// ============================================================
const state = {
  x: 0.5, y: 0.5,        // posizione normalizzata 0..1
  confidence: 0,
  room: { width: 6, height: 5, name: '—' },
  calibPoints: [],
  rssi: [],
  nearestLabel: '',
  showTrail: true,
  showLabels: true,
  trail: [],              // [{x, y}, ...]
  fps: 0,
  _frameCount: 0,
  _fpsTime: 0,
};

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 40, 700);
  const aspect = state.room.height / state.room.width;
  const w = maxW;
  const h = Math.round(w * aspect);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  ctx.scale(DPR, DPR);
}
window.addEventListener('resize', resizeCanvas);

// ============================================================
// Room calibration points from fingerprint JSON
// ============================================================
function loadCalibPoints(fmap) {
  state.room = fmap.room || state.room;
  state.calibPoints = (fmap.points || []).map(p => ({
    x: p.x / state.room.width,
    y: p.y / state.room.height,
    label: p.label || '',
    rssi: p.rssi || [],
  }));
}

// ============================================================
// Fetch fingerprint
// ============================================================
async function loadFingerprint() {
  try {
    const r = await fetch('fingerprint.json');
    const data = await r.json();
    loadCalibPoints(data);
    document.getElementById('roomName').textContent =
      `${data.room.name || '—'} (${data.room.width}×${data.room.height}m)`;
    resizeCanvas();
  } catch (e) {
    console.warn('fingerprint.json non caricato:', e);
  }
}

// ============================================================
// Draw
// ============================================================
function draw() {
  const W = canvas.width / DPR;
  const H = canvas.height / DPR;

  // Sfondo
  ctx.fillStyle = CFG.bgColor;
  ctx.fillRect(0, 0, W, H);

  // Griglia 1m
  const cellW = W / state.room.width;
  const cellH = H / state.room.height;
  ctx.strokeStyle = CFG.gridColor;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= state.room.width; i++) {
    ctx.beginPath(); ctx.moveTo(i * cellW, 0);
    ctx.lineTo(i * cellW, H); ctx.stroke();
  }
  for (let i = 0; i <= state.room.height; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * cellH);
    ctx.lineTo(W, i * cellH); ctx.stroke();
  }

  // Punti calibrazione
  if (state.showLabels) {
    for (const p of state.calibPoints) {
      const px = p.x * W, py = p.y * H;
      ctx.beginPath();
      ctx.arc(px, py, CFG.calibRadius, 0, Math.PI * 2);
      ctx.fillStyle = CFG.calibColor;
      ctx.fill();
      if (p.label) {
        ctx.fillStyle = CFG.calibLabelColor;
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.label, px, py - CFG.calibRadius - 4);
      }
    }
  }

  // Traccia
  if (state.showTrail && state.trail.length > 1) {
    ctx.beginPath();
    ctx.moveTo(state.trail[0].x * W, state.trail[0].y * H);
    for (let i = 1; i < state.trail.length; i++) {
      ctx.lineTo(state.trail[i].x * W, state.trail[i].y * H);
    }
    ctx.strokeStyle = CFG.trailColor;
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Dot posizione
  const dx = state.x * W, dy = state.y * H;

  // Glow
  const glow = ctx.createRadialGradient(dx, dy, 0, dx, dy, CFG.dotRadius * 3);
  glow.addColorStop(0, `rgba(56, 189, 248, ${0.15 + state.confidence * 0.25})`);
  glow.addColorStop(1, 'rgba(56, 189, 248, 0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(dx, dy, CFG.dotRadius * 3, 0, Math.PI * 2);
  ctx.fill();

  // Dot
  ctx.beginPath();
  ctx.arc(dx, dy, CFG.dotRadius, 0, Math.PI * 2);
  ctx.fillStyle = CFG.dotColor;
  ctx.fill();
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // FPS
  state._frameCount++;
  const now = performance.now();
  if (now - state._fpsTime >= 1000) {
    state.fps = state._frameCount;
    state._frameCount = 0;
    state._fpsTime = now;
    document.getElementById('fpsLabel').textContent = `${state.fps} fps`;
  }
}

// ============================================================
// Update position
// ============================================================
function updatePosition(data) {
  if (data.x != null && data.y != null) {
    const W = state.room.width;
    const H = state.room.height;
    state.x = Math.max(0, Math.min(1, data.x / W));
    state.y = Math.max(0, Math.min(1, data.y / H));
    state.confidence = data.confidence ?? 0;
    state.nearestLabel = data.nearest_label || '';
    state.rssi = data.rssi || [];

    if (state.showTrail) {
      state.trail.push({ x: state.x, y: state.y });
      if (state.trail.length > CFG.trailLength) state.trail.shift();
    }

    // Info
    document.getElementById('posLabel').textContent =
      `(${data.x.toFixed(1)}, ${data.y.toFixed(1)})`;
    document.getElementById('confLabel').textContent =
      `${(state.confidence * 100).toFixed(0)}%`;
    document.getElementById('nearestLabel')
      // non esiste, usiamo confLabel
    const rssiStr = state.rssi.map(v => `${v}`).join(' / ');
    document.getElementById('rssiLabel').textContent = rssiStr || '—';

    draw();
  }
}

// ============================================================
// WebSocket
// ============================================================
let ws = null;
let wsReconnectTimer = null;

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  try {
    ws = new WebSocket(CFG.wsUrl);
  } catch (e) {
    fallbackPoll();
    return;
  }

  ws.onopen = () => {
    document.getElementById('statusText').textContent = 'Connesso (WebSocket)';
    document.getElementById('statusDot').className = 'dot-live dot-green';
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'position') {
        updatePosition(msg);
      }
    } catch (e) { /* ignora */ }
  };

  ws.onclose = () => {
    document.getElementById('statusText').textContent = 'Disconnesso (polling)';
    document.getElementById('statusDot').className = 'dot-live dot-red';
    ws = null;
    fallbackPoll();
  };

  ws.onerror = () => {
    ws && ws.close();
  };
}

// ============================================================
// Polling fallback
// ============================================================
let pollTimer = null;

function fallbackPoll() {
  if (pollTimer) return;
  document.getElementById('statusText').textContent = 'Polling position.json';
  document.getElementById('statusDot').className = 'dot-live dot-red';

  async function poll() {
    try {
      const r = await fetch(CFG.pollUrl + '?_=' + Date.now());
      const data = await r.json();
      if (data.x != null && data.y != null) {
        updatePosition(data);
      }
    } catch (e) { /* ignora */ }
  }
  poll();
  pollTimer = setInterval(poll, CFG.pollInterval);
}

// ============================================================
// Controls
// ============================================================
document.getElementById('btnTrail').addEventListener('click', function() {
  state.showTrail = !state.showTrail;
  this.classList.toggle('active');
  if (!state.showTrail) state.trail = [];
  draw();
});
document.getElementById('btnTrail').classList.add('active');

document.getElementById('btnLabels').addEventListener('click', function() {
  state.showLabels = !state.showLabels;
  this.classList.toggle('active');
  draw();
});
document.getElementById('btnLabels').classList.add('active');

document.getElementById('btnReset').addEventListener('click', () => {
  state.trail = [];
  draw();
});

// ============================================================
// Init
// ============================================================
loadFingerprint().then(() => {
  connectWS();
  draw();
});

// Animazione anche senza dati
function animate() {
  draw();
  requestAnimationFrame(animate);
}
// Non serve — draw chiamato da updatePosition. Attiviamo animazione periodica
// per FPS counter anche in assenza di dati.
setInterval(() => draw(), 1000 / 10);
</script>
</body>
</html>
