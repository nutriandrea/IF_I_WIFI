<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Wi-Fi CSI Room 3D — Heatmap multi-RX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #05060e;
    color: #e2e8f0;
  }
  #canvas-container { position: absolute; inset: 0; }

  /* HUD */
  .hud {
    position: absolute;
    background: rgba(10, 14, 30, 0.78);
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 10px 14px;
    backdrop-filter: blur(6px);
    pointer-events: none;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  #hud-top-left { top: 12px; left: 12px; min-width: 240px; }
  #hud-top-right { top: 12px; right: 12px; min-width: 180px; text-align: right; }
  #hud-bottom-left { bottom: 12px; left: 12px; }
  #hud-bottom-right { bottom: 12px; right: 12px; font-size: 0.72rem; opacity: 0.7; }

  .hud h1 {
    font-size: 0.9rem;
    font-weight: 600;
    color: #38bdf8;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .hud .row { display: flex; justify-content: space-between; gap: 12px; }
  .hud .lbl { color: #64748b; }
  .hud .val { color: #e2e8f0; font-variant-numeric: tabular-nums; }
  .hud .big { font-size: 1.1rem; font-weight: 600; color: #fbbf24; }
  #status-dot {
    display: inline-block;
    width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  }
  #status-dot.live { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  #status-dot.dead { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  #status-dot.idle { background: #eab308; box-shadow: 0 0 6px #eab30888; }

  /* CSS2D labels on 3D objects */
  .marker-label {
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
    white-space: nowrap;
  }
  .marker-label.rx { background: rgba(34, 197, 94, 0.75); }
  .marker-label.tx { background: rgba(59, 130, 246, 0.75); }

  #probas-list {
    margin-top: 6px;
    max-height: 220px;
    overflow-y: auto;
    pointer-events: auto;
  }
  .proba-bar {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem;
    margin: 2px 0;
  }
  .proba-bar .label { width: 50px; color: #94a3b8; }
  .proba-bar .bg {
    flex: 1; height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .proba-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #fbbf24, #ef4444);
    transition: width 0.2s ease;
  }
  .proba-bar .pct {
    width: 38px; text-align: right; color: #cbd5e1;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud" id="hud-top-left">
  <h1>Wi-Fi CSI · Room 3D</h1>
  <div class="row"><span class="lbl">Stanza</span>
    <span class="val" id="room-dims">—</span></div>
  <div class="row"><span class="lbl">Griglia</span>
    <span class="val" id="grid-dims">—</span></div>
  <div class="row"><span class="lbl">Receivers</span>
    <span class="val" id="rx-count">0</span></div>
  <div class="row"><span class="lbl">Pingers</span>
    <span class="val" id="tx-count">0</span></div>
</div>

<div class="hud" id="hud-top-right">
  <h1>Stato</h1>
  <div class="row"><span class="lbl"><span id="status-dot" class="dead"></span>WS</span>
    <span class="val" id="ws-status">disconnesso</span></div>
  <div class="row"><span class="lbl">Frames</span>
    <span class="val" id="frame-count">0</span></div>
  <div class="row"><span class="lbl">FPS</span>
    <span class="val" id="fps">0</span></div>
  <div class="row"><span class="lbl">Last RSSI</span>
    <span class="val" id="last-rssi">—</span></div>
</div>

<div class="hud" id="hud-bottom-left">
  <h1>Predizione</h1>
  <div class="row"><span class="lbl">Classe</span>
    <span class="val big" id="pred-class">—</span></div>
  <div class="row"><span class="lbl">Confidence</span>
    <span class="val" id="pred-conf">—</span></div>
  <div class="row"><span class="lbl">MAC sorgente</span>
    <span class="val" id="pred-mac">—</span></div>
  <div id="probas-list"></div>
</div>

<div class="hud" id="hud-bottom-right">
  Drag = rotate · Scroll = zoom · Right-drag = pan<br>
  URL params: <code>ws,room,grid,rx,tx,trail</code>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================
// Configurazione via URL params
//   ?ws=ws://localhost:8765
//   ?room=6x5x3                  (width x length x height in meters)
//   ?grid=4x5                    (rows x cols)
//   ?rx=0.5,0.5;5.5,0.5;3,4.5    (x,y per ogni RX, separati da ';')
//   ?tx=1,1;5,1;3,4              (x,y per ogni pinger)
//   ?trail=1                     (mostra trail)
// ============================================================
const params = new URLSearchParams(location.search);

function parseDims(s, defaults) {
  if (!s) return defaults;
  const parts = s.toLowerCase().split('x').map(Number);
  if (parts.some(isNaN)) return defaults;
  return parts;
}
function parsePoints(s, defaults) {
  if (!s) return defaults;
  return s.split(';').map(pair => {
    const [x, y] = pair.split(',').map(Number);
    return { x: x || 0, y: y || 0 };
  });
}

const CFG = {
  wsUrl: params.get('ws') || `ws://${location.hostname || 'localhost'}:8765`,
  roomDims: parseDims(params.get('room'), [6, 5, 3]),     // W, L, H
  gridDims: parseDims(params.get('grid'), [4, 5]),        // rows, cols
  rxPositions: parsePoints(params.get('rx'),
    [{x:0.5,y:0.5},{x:5.5,y:0.5},{x:3.0,y:4.5}]),
  txPositions: parsePoints(params.get('tx'),
    [{x:1,y:1},{x:5,y:1},{x:3,y:4}]),
  showTrail: params.get('trail') === '1',
  trailLength: 60,
};

const [ROOM_W, ROOM_L, ROOM_H] = CFG.roomDims;
const [GRID_R, GRID_C] = CFG.gridDims;

// ============================================================
// Scene setup
// ============================================================
const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060e);
scene.fog = new THREE.Fog(0x05060e, 12, 35);

const camera = new THREE.PerspectiveCamera(
  60, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(ROOM_W * 0.6, ROOM_H * 1.8, ROOM_L * 1.4);
camera.lookAt(ROOM_W / 2, 0, ROOM_L / 2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(container.clientWidth, container.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.inset = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(ROOM_W / 2, 0, ROOM_L / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 2;
controls.maxDistance = 30;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dir = new THREE.DirectionalLight(0xffffff, 0.7);
dir.position.set(ROOM_W * 0.5, ROOM_H * 2, ROOM_L * 0.5);
dir.castShadow = true;
scene.add(dir);
scene.add(new THREE.HemisphereLight(0x6677aa, 0x223344, 0.4));

// ============================================================
// Stanza (pavimento + pareti semitrasparenti)
// ============================================================
function buildRoom() {
  // Floor
  const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_L);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x1a2236, roughness: 0.9, metalness: 0.0
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set(ROOM_W / 2, 0, ROOM_L / 2);
  floor.receiveShadow = true;
  scene.add(floor);

  // Walls (semi-transparent)
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x2a3a5a, transparent: true, opacity: 0.18,
    side: THREE.DoubleSide,
  });
  const w1 = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), wallMat);
  w1.position.set(ROOM_W / 2, ROOM_H / 2, 0); scene.add(w1);
  const w2 = w1.clone(); w2.position.z = ROOM_L; scene.add(w2);
  const w3 = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_L, ROOM_H), wallMat);
  w3.rotation.y = Math.PI / 2;
  w3.position.set(0, ROOM_H / 2, ROOM_L / 2); scene.add(w3);
  const w4 = w3.clone(); w4.position.x = ROOM_W; scene.add(w4);

  // Floor grid (every 0.5m)
  const gridHelper = new THREE.GridHelper(
    Math.max(ROOM_W, ROOM_L), Math.max(ROOM_W, ROOM_L) * 2,
    0x334155, 0x1e293b);
  gridHelper.position.set(ROOM_W / 2, 0.005, ROOM_L / 2);
  scene.add(gridHelper);

  // Axes for orientation (corner)
  const axes = new THREE.AxesHelper(0.6);
  axes.position.set(0.05, 0.05, 0.05);
  scene.add(axes);
}
buildRoom();

// ============================================================
// Heatmap: griglia di celle sul pavimento
//   Ogni cella e' un PlaneGeometry con materiale individuale.
//   La probabilita' viene mappata a colore + altezza (opzionale).
// ============================================================
const cells = [];   // [{mesh, row, col, label}]
function buildHeatmap() {
  const cellW = ROOM_W / GRID_C;
  const cellL = ROOM_L / GRID_R;
  const geo = new THREE.PlaneGeometry(cellW * 0.92, cellL * 0.92);

  for (let r = 0; r < GRID_R; r++) {
    for (let c = 0; c < GRID_C; c++) {
      const mat = new THREE.MeshBasicMaterial({
        color: 0x0a0f1f,
        transparent: true,
        opacity: 0.6,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(
        (c + 0.5) * cellW,
        0.02,
        (r + 0.5) * cellL
      );
      scene.add(mesh);

      // Cell label
      const labelDiv = document.createElement('div');
      labelDiv.className = 'marker-label';
      labelDiv.style.background = 'rgba(0,0,0,0.35)';
      labelDiv.style.fontSize = '0.6rem';
      labelDiv.textContent = `r${r}c${c}`;
      const labelObj = new CSS2DObject(labelDiv);
      labelObj.position.set(0, 0, 0);
      mesh.add(labelObj);

      cells.push({ mesh, row: r, col: c, label: `r${r}c${c}`, prob: 0 });
    }
  }
}
buildHeatmap();

// ============================================================
// Marker ricevitori (verde) e pinger (blu)
// ============================================================
function makeMarker(x, y, z, color, label, cls) {
  const isRx = cls === 'rx';
  const geo = isRx
    ? new THREE.BoxGeometry(0.25, 0.18, 0.18)
    : new THREE.SphereGeometry(0.13, 24, 16);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.4,
    roughness: 0.3, metalness: 0.4,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, z, y);   // mapping: WSx=x (world), y(up)=z(input), z=y(input)
  m.castShadow = true;
  scene.add(m);

  // Label
  const labelDiv = document.createElement('div');
  labelDiv.className = `marker-label ${cls}`;
  labelDiv.textContent = label;
  const labelObj = new CSS2DObject(labelDiv);
  labelObj.position.set(0, 0.25, 0);
  m.add(labelObj);

  return m;
}

const rxMarkers = CFG.rxPositions.map((p, i) =>
  makeMarker(p.x, p.y, 0.4 + 0.1 * i, 0x22c55e, `RX${i}`, 'rx'));
const txMarkers = CFG.txPositions.map((p, i) =>
  makeMarker(p.x, p.y, 1.0, 0x3b82f6, `TX${i}`, 'tx'));

document.getElementById('rx-count').textContent = rxMarkers.length;
document.getElementById('tx-count').textContent = txMarkers.length;
document.getElementById('room-dims').textContent =
  `${ROOM_W}×${ROOM_L}×${ROOM_H} m`;
document.getElementById('grid-dims').textContent = `${GRID_R}×${GRID_C}`;

// ============================================================
// Person marker (sfera rossa) + trail
// ============================================================
const personGeo = new THREE.SphereGeometry(0.18, 32, 24);
const personMat = new THREE.MeshStandardMaterial({
  color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.6,
  roughness: 0.2,
});
const personMesh = new THREE.Mesh(personGeo, personMat);
personMesh.position.set(ROOM_W / 2, 0.18, ROOM_L / 2);
personMesh.visible = false;
scene.add(personMesh);

// Glow ring sotto la persona (mostra confidence)
const glowGeo = new THREE.RingGeometry(0.3, 0.5, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xef4444, side: THREE.DoubleSide,
  transparent: true, opacity: 0.0, depthWrite: false,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.rotation.x = -Math.PI / 2;
glow.position.set(0, 0.03, 0);
personMesh.add(glow);

// Trail
const trailMaxLen = CFG.trailLength;
const trailPoints = [];
const trailGeo = new THREE.BufferGeometry();
const trailMat = new THREE.LineBasicMaterial({
  color: 0xfbbf24, transparent: true, opacity: 0.6,
});
const trailLine = new THREE.Line(trailGeo, trailMat);
trailLine.visible = CFG.showTrail;
scene.add(trailLine);

// ============================================================
// Mappa cella → coordinate mondo
// ============================================================
function cellCenter(row, col) {
  const cellW = ROOM_W / GRID_C;
  const cellL = ROOM_L / GRID_R;
  return {
    x: (col + 0.5) * cellW,
    z: (row + 0.5) * cellL,
  };
}

// Color stops per heatmap (blue → cyan → yellow → red)
function probToColor(p) {
  // p in [0,1]
  const t = Math.max(0, Math.min(1, p));
  let r, g, b;
  if (t < 0.25) {
    const k = t / 0.25;
    r = 0.05; g = 0.1 + 0.4 * k; b = 0.25 + 0.5 * k;
  } else if (t < 0.5) {
    const k = (t - 0.25) / 0.25;
    r = 0.05; g = 0.5 + 0.5 * k; b = 0.75 - 0.55 * k;
  } else if (t < 0.75) {
    const k = (t - 0.5) / 0.25;
    r = 0.05 + 0.95 * k; g = 1.0 - 0.2 * k; b = 0.2 - 0.15 * k;
  } else {
    const k = (t - 0.75) / 0.25;
    r = 1.0; g = 0.8 - 0.8 * k; b = 0.05;
  }
  return new THREE.Color(r, g, b);
}

// ============================================================
// Probabilita' → aggiorna heatmap + persona
// ============================================================
function updateFromProbas(probas, predictedClass, confidence) {
  // 1) Aggiorna ogni cella della heatmap
  let maxP = 0, maxCell = null;
  for (const c of cells) {
    const p = probas[c.label] || 0;
    c.prob = p;
    c.mesh.material.color = probToColor(p);
    c.mesh.material.opacity = 0.35 + 0.55 * Math.min(1, p * 1.5);
    if (p > maxP) { maxP = p; maxCell = c; }
  }

  // 2) Posiziona la persona sulla cella piu' probabile (se non EMPTY)
  if (predictedClass && predictedClass !== 'EMPTY' && maxCell) {
    const pos = cellCenter(maxCell.row, maxCell.col);
    personMesh.position.x = pos.x;
    personMesh.position.z = pos.z;
    personMesh.position.y = 0.18;
    personMesh.visible = true;
    // Glow proporzionale a confidence
    glow.material.opacity = 0.15 + 0.5 * (confidence || maxP);

    // Trail
    if (CFG.showTrail) {
      trailPoints.push(new THREE.Vector3(pos.x, 0.15, pos.z));
      if (trailPoints.length > trailMaxLen) trailPoints.shift();
      trailGeo.setFromPoints(trailPoints);
    }
  } else {
    personMesh.visible = false;
    glow.material.opacity = 0;
  }
}

// ============================================================
// HUD updates
// ============================================================
function updateProbasList(probas) {
  const list = document.getElementById('probas-list');
  list.innerHTML = '';
  const sorted = Object.entries(probas || {})
    .sort((a, b) => b[1] - a[1])
    .slice(0, 8);
  for (const [label, p] of sorted) {
    const row = document.createElement('div');
    row.className = 'proba-bar';
    row.innerHTML = `
      <span class="label">${label}</span>
      <span class="bg"><span class="fill" style="width:${(p*100).toFixed(0)}%"></span></span>
      <span class="pct">${(p*100).toFixed(1)}%</span>`;
    list.appendChild(row);
  }
}

function setWsStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = state;
  document.getElementById('ws-status').textContent = text;
}

// ============================================================
// WebSocket
// ============================================================
let ws = null;
let frameCount = 0;
let reconnectTimer = null;

function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN ||
             ws.readyState === WebSocket.CONNECTING)) return;
  setWsStatus('idle', 'connessione...');
  try {
    ws = new WebSocket(CFG.wsUrl);
  } catch (e) {
    setWsStatus('dead', 'errore');
    scheduleReconnect();
    return;
  }

  ws.onopen = () => setWsStatus('live', 'connesso');
  ws.onclose = () => { setWsStatus('dead', 'disconnesso'); scheduleReconnect(); };
  ws.onerror = () => ws.close();

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'position' || msg.type === 'seat_prediction') {
      const cls = msg.class || msg.prediction || 'EMPTY';
      const probas = msg.probas || msg.probabilities || {};
      const conf = msg.confidence ||
        (probas[cls] ? probas[cls] : Math.max(...Object.values(probas || {0:0})));

      updateFromProbas(probas, cls, conf);
      updateProbasList(probas);

      document.getElementById('pred-class').textContent = cls;
      document.getElementById('pred-conf').textContent =
        conf ? `${(conf*100).toFixed(1)}%` : '—';
      document.getElementById('pred-mac').textContent =
        msg.mac ? msg.mac.slice(-8) : '—';
      document.getElementById('last-rssi').textContent =
        msg.rssi ? `${msg.rssi} dBm` : '—';

      frameCount++;
      document.getElementById('frame-count').textContent = frameCount;
    }
  };
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connectWS, 2000);
}

connectWS();

// ============================================================
// FPS counter
// ============================================================
let frameTimes = [];
function updateFps() {
  const now = performance.now();
  frameTimes.push(now);
  while (frameTimes.length > 0 && now - frameTimes[0] > 1000) {
    frameTimes.shift();
  }
  document.getElementById('fps').textContent = frameTimes.length;
}

// ============================================================
// Render loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Pulse on the person marker
  if (personMesh.visible) {
    const k = 1 + 0.08 * Math.sin(performance.now() / 250);
    personMesh.scale.setScalar(k);
    glow.material.opacity *= 0.995;
    glow.material.opacity = Math.max(0.15, glow.material.opacity);
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
  updateFps();
}
animate();

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
});

// ============================================================
// Demo mode (se WS down dopo 5s, simula dati casuali)
// ============================================================
setTimeout(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    console.log('[demo] WS non connesso, attivo simulazione');
    setWsStatus('idle', 'demo mode');
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      // Random walk su griglia
      const probas = {};
      const tgtR = Math.floor(Math.random() * GRID_R);
      const tgtC = Math.floor(Math.random() * GRID_C);
      for (const c of cells) {
        const dr = c.row - tgtR, dc = c.col - tgtC;
        const d2 = dr*dr + dc*dc;
        probas[c.label] = Math.exp(-d2 * 0.6);
      }
      // Normalize
      const sum = Object.values(probas).reduce((a,b)=>a+b, 0);
      for (const k of Object.keys(probas)) probas[k] /= sum;
      const cls = `r${tgtR}c${tgtC}`;
      updateFromProbas(probas, cls, probas[cls]);
      updateProbasList(probas);
      document.getElementById('pred-class').textContent = cls + ' (sim)';
      document.getElementById('pred-conf').textContent =
        (probas[cls]*100).toFixed(1) + '%';
      document.getElementById('last-rssi').textContent = '—';
      frameCount++;
      document.getElementById('frame-count').textContent = frameCount;
    }, 700);
  }
}, 5000);

</script>
</body>
</html>
